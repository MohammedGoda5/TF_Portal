name: Web End-to-End Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge
          - all
      runner:
        description: 'Runner type (self-hosted recommended for VPN)'
        required: true
        default: 'self-hosted'
        type: choice
        options:
          - self-hosted
          - ubuntu-latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  determine-browsers:
    runs-on: ubuntu-latest
    outputs:
      browsers: ${{ steps.set-browsers.outputs.browsers }}
      runner: ${{ steps.set-runner.outputs.runner }}
    steps:
      - id: set-browsers
        run: |
          if [ "${{ github.event.inputs.browser }}" == "all" ]; then
            echo "browsers=[\"chrome\", \"firefox\", \"edge\"]" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.browser }}" ]; then
            echo "browsers=[\"${{ github.event.inputs.browser }}\"]" >> $GITHUB_OUTPUT
          else
            echo "browsers=[\"chrome\"]" >> $GITHUB_OUTPUT
          fi
        shell: bash
      - id: set-runner
        run: |
          if [ -n "${{ github.event.inputs.runner }}" ]; then
            echo "runner=${{ github.event.inputs.runner }}" >> $GITHUB_OUTPUT
          else
            echo "runner=self-hosted" >> $GITHUB_OUTPUT
          fi
        shell: bash

  test:
    needs: determine-browsers
    runs-on: ${{ needs.determine-browsers.outputs.runner }}
    strategy:
      matrix:
        browser: ${{ fromJson(needs.determine-browsers.outputs.browsers) }}
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify VPN Connection (Self-Hosted)
        if: ${{ needs.determine-browsers.outputs.runner == '"'"'self-hosted'"'"' }}
        run: |
          echo "Checking network connectivity..."
          # Add your site URL here to verify VPN
          # curl -sSf https://your-site.com > /dev/null || echo "Warning: Site not reachable, check VPN"
          echo "VPN assumed connected on self-hosted runner"

      - name: Start Selenium Grid
        run: |
          docker compose -f docker-compose.yml up --scale chrome=2 --scale edge=2 --scale firefox=2 -d

      - name: Wait for Grid
        run: |
          timeout 120s bash -c '"'"'until curl -sSf http://localhost:4444/status > /dev/null; do sleep 1; done'"'"'

      - name: Run Tests
        run: |
          mvn -e clean test "-DtargetOperatingSystem=LINUX" "-DtargetBrowserName=${{ matrix.browser }}" "-DexecutionAddress=localhost:4444" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-DretryMaximumNumberOfAttempts=1" "-DsetParallel=NONE" "-DsetParallelMode=STATIC"

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.browser }}-${{ github.run_id }}
          path: allure-report/
          retention-days: 14

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.browser }}-${{ github.run_id }}
          path: |
            target/logs/
            target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

      - name: Test Summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: "target/surefire-reports/junitreports/TEST-*.xml"

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v || true
          docker system prune -f || true
