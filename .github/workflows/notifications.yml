name: Notifications

on:
  workflow_run:
    workflows: ["Web End-to-End Testing", "Scheduled Regression", "PR Checks"]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Slack Notification
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ github.event.workflow_run.conclusion }}
          channel: '#test-automation'
          text: |
            🚨 Workflow Failed: ${{ github.event.workflow_run.name }}
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.event.workflow_run.head_branch }}
            Run ID: ${{ github.event.workflow_run.id }}
            
            View Details: ${{ github.event.workflow_run.html_url }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Send Microsoft Teams Notification
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        uses: jdcargile/ms-teams-notification@v1.4
        with:
          github-token: ${{ github.token }}
          ms-teams-webhook-uri: ${{ secrets.TEAMS_WEBHOOK_URL }}
          notification-summary: Workflow Failed - ${{ github.event.workflow_run.name }}
          notification-color: 'ff0000'
          timezone: Africa/Cairo
        continue-on-error: true
