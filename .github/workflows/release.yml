name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Project
        run: mvn clean package -DskipTests

      - name: Create Release Package
        run: |
          mkdir -p release-package
          cp -r src release-package/
          cp pom.xml release-package/
          cp README.md release-package/ 2>/dev/null || echo "No README.md found"
          cp -r target/*.jar release-package/ 2>/dev/null || echo "No JAR files found"
          cd release-package
          zip -r ../TFPortal-release.zip .

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            TFPortal-release.zip
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Upload Artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: TFPortal-release-${{ github.run_id }}
          path: TFPortal-release.zip
          retention-days: 30
