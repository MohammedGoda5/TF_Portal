name: Scheduled Regression

on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser'
        default: 'chrome'
        type: choice
        options: [chrome, firefox, edge]

jobs:
  regression:
    runs-on: self-hosted
    # GitHub manages the lifecycle of these containers automatically
    services:
      selenium-hub:
        image: selenium/hub:4.18.1
        ports:
          - 4444:4444
      chrome:
        image: selenium/node-chrome:4.18.1
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
          # Direct IP mapping for your local portal
          EXTRA_HOSTS: "qc.tf.customerportal.web.nicedeer.local:192.168.2.5"

    # Cleanly map SHAFT properties to Environment Variables
    env:
      targetOperatingSystem: LINUX
      targetBrowserName: ${{ github.event.inputs.browser || 'chrome' }}
      executionAddress: localhost:4444
      headlessExecution: true
      remoteDriverConnectTimeout: 150
      browserNavigationTimeout: 120

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run SHAFT Tests
        # No more long CLI strings; SHAFT reads the 'env' section above
        run: mvn clean test

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/