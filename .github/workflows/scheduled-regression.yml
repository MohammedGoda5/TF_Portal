name: Run Tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven' # Speeds up subsequent runs by caching dependencies

      - name: Run tests
          run: |
            mvn -e test \
              -DtargetBrowserName=CHROME \
              -DheadlessExecution=true \
              -DtargetOperatingSystem=LINUX \
              -Dpc_chromeOptions_args="--no-sandbox;--disable-dev-shm-usage;--disable-gpu"

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report # This creates the site in target/site/allure-maven-plugin

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin/ # Standard path for Maven Allure plugin
          retention-days: 7