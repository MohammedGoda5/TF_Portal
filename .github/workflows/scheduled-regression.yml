name: Scheduled Regression

on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser'
        default: 'chrome'
        type: choice
        options: [chrome, firefox, edge]

jobs:
  regression:
    runs-on: self-hosted
    env:
      # Removed targetOperatingSystem to prevent protocol conflicts
      targetBrowserName: ${{ github.event.inputs.browser || 'chrome' }}
      executionAddress: localhost:4444
      DOCKER_HOST: npipe:////./pipe/docker_engine

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start Selenium Grid
        run: |
          docker compose down -v
          docker compose up -d
          
          $maxAttempts = 30
          for ($i=1; $i -le $maxAttempts; $i++) {
            try {
              $status = Invoke-RestMethod -Uri "http://localhost:4444/status"
              if ($status.value.ready -eq $true -and $status.value.nodes.Count -gt 0) {
                Write-Host "Selenium Grid is ready!"
                return
              }
            } catch {}
            Write-Host "Waiting for Grid... (${i})"
            Start-Sleep -Seconds 5
          }
          throw "Grid failed to start"

      - name: Run SHAFT Tests
        run: |
          mvn clean test `
          "-DexecutionAddress=localhost:4444" `
          "-DtargetBrowserName=${{ github.event.inputs.browser || 'chrome' }}" `
          "-DheadlessExecution=true"

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report/

      - name: Cleanup
        if: always()
        run: docker compose down -v