name: Scheduled Regression

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge
          - all
      environment:
        description: 'Test environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  determine-browsers:
    runs-on: ubuntu-latest
    outputs:
      browsers: ${{ steps.set-browsers.outputs.browsers }}
    steps:
      - id: set-browsers
        run: |
          if [ "${{ github.event.inputs.browser }}" == "chrome" ] || [ -z "${{ github.event.inputs.browser }}" ]; then
            echo "browsers=[\"chrome\"]" >> $GITHUB_OUTPUT
          else
            echo "browsers=[\"${{ github.event.inputs.browser }}\"]" >> $GITHUB_OUTPUT
          fi
        shell: bash

  regression:
    needs: determine-browsers
    runs-on: self-hosted
    # This default ensures ALL steps below use Bash, fixing the path/syntax errors on Windows
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        browser: ${{ fromJson(needs.determine-browsers.outputs.browsers) }}
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify VPN Connection
        run: |
          echo "Verifying VPN connection on self-hosted runner..."
          echo "Assuming VPN is connected on self-hosted runner"
        continue-on-error: true

      - name: Check Docker Availability
        shell: pwsh
        run: |
          docker --version
          if ($LASTEXITCODE -ne 0) { Write-Host "Docker not found" }
          docker compose version
          if ($LASTEXITCODE -ne 0) { Write-Host "Docker Compose not found" }

      - name: Stop Existing Selenium Grid
        run: |
          echo "Stopping any existing Selenium Grid containers..."
          docker compose -f docker-compose.yml down -v || true
          docker-compose -f docker-compose.yml down -v || true
          # Using conditional to avoid errors if no containers exist
          docker ps -aq --filter "name=selenium" | xargs -r docker rm -f || true

      - name: Start Selenium Grid
        run: |
          echo "Starting Selenium Grid..."
          docker compose -f docker-compose.yml up -d
          echo "Containers started. Waiting for services..."
          sleep 10
          docker ps -a
          docker compose logs selenium-hub --tail 20 || true

      - name: Wait for Grid
        timeout-minutes: 3
        run: |
          echo "Waiting for Selenium Grid to be ready..."
          for i in {1..60}; do
            if curl -sSf http://localhost:4444/status > /dev/null 2>&1; then
              echo "Selenium Grid is ready!"
              curl -s http://localhost:4444/status | head -20
              exit 0
            fi
            echo "Attempt $i: Grid not ready yet, waiting..."
            sleep 2
          done
          echo "ERROR: Selenium Grid failed to start within timeout"
          exit 1

      - name: Run Full Regression Suite
        run: |
          mvn -e clean test "-DtargetOperatingSystem=LINUX" "-DtargetBrowserName=${{ matrix.browser }}" "-DexecutionAddress=localhost:4444" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-DretryMaximumNumberOfAttempts=2" "-DsetParallel=NONE" "-DsetParallelMode=STATIC"
        env:
          TEST_ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-regression-${{ matrix.browser }}-${{ github.run_id }}
          path: allure-report/
          retention-days: 30

      - name: Upload Test Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}-${{ github.run_id }}
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Generate Test Summary
        if: always()
        run: |
          echo "## Regression Test Results - ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "| ${{ matrix.browser }} | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ${{ matrix.browser }} | :x: Failed |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up Docker resources..."
          docker compose down -v || true
          docker system prune -f || true