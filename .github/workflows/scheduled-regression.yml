name: Run Tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run tests
        continue-on-error: true
        run: |
          mvn -e test \
            -DtargetBrowserName=CHROME \
            -DheadlessExecution=true \
            -DtargetOperatingSystem=LINUX \
            -Dpc_chromeOptions_args="--no-sandbox;--disable-dev-shm-usage;--disable-gpu;--remote-allow-origins=*" \
            -Dwebdriver.chrome.driver=$(which chromedriver)

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin/
          retention-days: 7