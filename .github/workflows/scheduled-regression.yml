name: Scheduled Regression

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge
          - all
      environment:
        description: 'Test environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  determine-browsers:
    runs-on: ubuntu-latest
    outputs:
      browsers: ${{ steps.set-browsers.outputs.browsers }}
    steps:
      - id: set-browsers
        shell: bash
        run: |
          if [ "${{ github.event.inputs.browser }}" == "chrome" ] || [ -z "${{ github.event.inputs.browser }}" ]; then
            echo "browsers=[\"chrome\"]" >> $GITHUB_OUTPUT
          else
            echo "browsers=[\"${{ github.event.inputs.browser }}\"]" >> $GITHUB_OUTPUT
          fi

  regression:
    needs: determine-browsers
    runs-on: self-hosted
    env:
      DOCKER_HOST: npipe:////./pipe/docker_engine
    defaults:
      run:
        shell: powershell
    strategy:
      matrix:
        browser: ${{ fromJson(needs.determine-browsers.outputs.browsers) }}
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify VPN Connection
        run: Write-Host "Verifying VPN connection on self-hosted runner..."

      - name: Check Docker Availability
        run: |
          docker --version
          docker compose version
          docker ps

      - name: Stop Existing Selenium Grid
        continue-on-error: true
        run: |
          docker compose -f docker-compose.yml down -v
          $containers = docker ps -aq --filter "name=selenium"
          if ($containers) { docker rm -f $containers }

      - name: Start Selenium Grid
        run: |
          docker compose -f docker-compose.yml up -d
          Start-Sleep -Seconds 15
          docker ps -a

      - name: Wait for Grid
        run: |
          $maxAttempts = 30
          for ($i=1; $i -le $maxAttempts; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:4444/status" -UseBasicParsing -ErrorAction Stop
              if ($response.StatusCode -eq 200) {
                Write-Host "Selenium Grid is ready!"
                return
              }
            } catch {
              Write-Host "Attempt $i -- Grid not ready, waiting..."
              Start-Sleep -Seconds 5
            }
          }
          Write-Error "Selenium Grid failed to start within the timeout period."
          exit 1

      - name: Run Full Regression Suite
        run: |
          mvn -e clean test `
          "-DtargetOperatingSystem=LINUX" `
          "-DtargetBrowserName=${{ matrix.browser }}" `
          "-DexecutionAddress=localhost:4444" `
          "-DheadlessExecution=true" `
          "-DgenerateAllureReportArchive=true" `
          "-DretryMaximumNumberOfAttempts=2" `
          "-DsetParallel=NONE" `
          "-DsetParallelMode=STATIC"
        env:
          TEST_ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-regression-${{ matrix.browser }}-${{ github.run_id }}
          path: allure-report/
          retention-days: 30

      - name: Upload Test Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}-${{ github.run_id }}
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
          docker system prune -f