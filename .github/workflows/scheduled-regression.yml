name: Scheduled Regression

on:
  workflow_dispatch:

jobs:
  regression:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Fresh Grid
        shell: powershell
        run: |
          docker compose down -v
          docker compose up -d
          Start-Sleep -Seconds 15

      - name: Run SHAFT Tests
        shell: powershell
        run: |
          mvn clean test `
          "-DexecutionAddress=localhost:4444" `
          "-DtargetBrowserName=CHROME" `
          "-DheadlessExecution=true" `
          "-DremoteDriverConnectTimeout=300" `
          "-DbrowserNavigationTimeout=120" `
          "-Dcapabilities.acceptInsecureCerts=true"